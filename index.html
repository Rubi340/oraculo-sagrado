<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oráculo Sagrado Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,500&display=swap');
        :root { --fondo: #050508; --oro: #c5a059; --texto: #d1d1d1; --oro-brillo: rgba(197, 160, 89, 0.8); }
        
        body { background: var(--fondo); color: var(--texto); font-family: 'Lora', serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }

        /* Capas visuales Pro */
        .neblina { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'); opacity: 0.1; z-index: -1; animation: moveNeblina 60s linear infinite; }
        @keyframes moveNeblina { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }
        #canvas-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .screen { text-align: center; width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; transition: opacity 0.8s; z-index: 10; }
        .fade-out { opacity: 0 !important; }
        .fade-in { animation: fadeIn 1s; }
        
        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--oro); letter-spacing: 2px; text-shadow: 0 0 15px var(--oro-brillo); margin: 10px 0; }
        
        /* Ajuste de carta diaria para que no tape el botón */
        #daily-card-container { width: 180px; margin: 15px auto; }
        #daily-card-container .card { width: 100% !important; }

        .portal { width: 80px; height: 80px; border: 2px double var(--oro); border-radius: 50%; margin: 15px auto; animation: rotatePortal 20s linear infinite; box-shadow: 0 0 30px var(--oro-brillo); position: relative; }
        .portal::after { content: '✦'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--oro); font-size: 1.2rem; }
        @keyframes rotatePortal { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .velita { width: 35px; height: 35px; background: radial-gradient(circle, #fff, #ffcc00, transparent); border-radius: 50%; margin: 15px auto; filter: blur(4px); animation: flame 1.5s infinite alternate; }
        @keyframes flame { from { transform: scale(1); opacity: 0.7; } to { transform: scale(1.2); opacity: 1; } }

        button { background: linear-gradient(to bottom, #d4af37, #c5a059); border: none; color: black; padding: 14px; font-family: 'Cinzel'; cursor: pointer; margin: 10px auto; width: 260px; border-radius: 5px; font-weight: bold; text-transform: uppercase; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4); }
        
        input, select, textarea { background: rgba(255,255,255,0.05); border: none; border-bottom: 1px solid var(--oro); color: white; text-align: center; padding: 10px; margin: 8px; font-size: 1.1rem; outline: none; width: 80%; max-width: 280px; font-family: 'Lora'; }
        
        #main-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 10px; width: 100%; margin: 15px auto; max-height: 45vh; overflow-y: auto; padding: 10px; opacity: 0.3; transition: 1s; }
        .board-focus { opacity: 1 !important; transform: scale(1); }
        
        .card { width: 100%; aspect-ratio: 2/3.5; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; border: 1px solid var(--oro); overflow: hidden; }
        .back { background: radial-gradient(circle, #1a0b2e, #050508); display: flex; align-items: center; justify-content: center; color: var(--oro); font-size: 1.5rem; }
        .front { background: #1a0b2e; transform: rotateY(180deg); display: flex; flex-direction: column; }
        .front img { width: 100%; height: 82%; object-fit: cover; border-bottom: 1px solid var(--oro); }
        .front span { font-size: 8px; color: var(--oro); font-weight: bold; padding: 3px; font-family: 'Cinzel'; text-align: center; }

        .special-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--fondo); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .res-txt { font-style: italic; color: #fff; margin: 10px 0; font-size: 1rem; border-left: 2px solid var(--oro); padding-left: 12px; text-align: left; line-height: 1.5; }
        .consejo-box { border: 1px dashed var(--oro); padding: 12px; margin-top: 15px; background: rgba(197, 160, 89, 0.1); color: var(--oro); font-size: 0.9rem; border-radius: 8px; }

        #selection-display { display: flex; gap: 10px; justify-content: center; width: 100%; margin: 15px auto; }
        .selected-wrapper { filter: drop-shadow(0 0 15px var(--oro-brillo)); animation: fireGlow 2s infinite alternate; }
        @keyframes fireGlow { from { filter: drop-shadow(0 0 8px rgba(197, 160, 89, 0.5)); } to { filter: drop-shadow(0 0 20px var(--oro-brillo)); } }
        #selection-display .card { width: 85px; }

        .eye-ritual { font-size: 1.2rem; color: var(--oro); font-style: italic; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="neblina"></div>
    <canvas id="canvas-stars"></canvas>

    <div id="scr-login" class="screen" style="display:none;">
        <h1>Oráculo Sagrado</h1>
        <div class="portal"></div>
        <input type="text" id="user-name" placeholder="Tu Nombre">
        <select id="user-month">
            <option value="" disabled selected>Mes de Nacimiento</option>
            <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
            <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
            <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
            <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
        <button onclick="saveUser()">Consagrar Acceso</button>
    </div>

    <div id="scr-ritual-eyes" class="screen" style="display:none;">
        <h3 id="ritual-msg" style="min-height: 40px;"></h3>
        <div class="portal"></div>
        <div class="eye-ritual">Cierra los ojos...</div>
        <p>Conecta con tu interior para recibir tu guía.</p>
        <button onclick="mostrarArcanoDia()">Todo está listo</button>
    </div>

    <div id="scr-daily" class="screen" style="display:none;">
        <h3 id="daily-welcome"></h3>
        <h2>Revelación de Hoy</h2>
        <div id="daily-card-container"></div>
        <div id="daily-text" class="res-txt"></div>
        <button onclick="irTableroRitual()">Lectura Profunda</button>
    </div>

    <div id="scr-ritual-3" class="screen" style="display:none;">
        <p id="guia-3" style="color:var(--oro)">Baraja las energías...</p>
        <button id="btn-mix" onclick="mezclar()">Barajar Mazo</button>
        <div id="main-board"></div>
    </div>

    <div id="scr-visualize" class="special-screen">
        <h3>TUS CARTAS ELEGIDAS</h3>
        <div id="selection-display"></div>
        <p style="color:var(--oro); font-style:italic;">Visualiza tu elección...</p>
        <button id="btn-read-now" style="display:none;" onclick="irCargaMistica()">LEER LAS CARTAS</button>
    </div>

    <div id="scr-loading" class="special-screen">
        <div class="portal"></div>
        <h3 class="eye-ritual">El oráculo habla...</h3>
    </div>

    <div id="scr-results" class="special-screen">
        <h2>Voz del Destino</h2>
        <div id="res-content" style="max-width: 450px;"></div>
        <button onclick="irPeticion()">Elevar Petición</button>
    </div>

    <div id="scr-peticion" class="special-screen">
        <div class="velita"></div>
        <h3>Tu Petición Sagrada</h3>
        <textarea id="p-input" placeholder="Escribe aquí tu deseo..."></textarea>
        <button onclick="enviarPeticion()">Sellar Deseo</button>
    </div>

    <div id="scr-final" class="special-screen">
        <div class="velita" style="animation-duration: 0.5s;"></div>
        <h2>Petición Enviada</h2>
        <p>Tu mensaje se ha disuelto en la luz divina.</p>
        <button onclick="location.reload()">Regresar</button>
    </div>

<script>
    /* Estrellas Pro */
    const canvas = document.getElementById('canvas-stars');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function initParticles() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        particles = [];
        for(let i=0; i<40; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: Math.random()*0.4+0.1 });
    }
    function animateParticles() {
        ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "#c5a059";
        particles.forEach(p => { p.y -= p.speed; if(p.y < 0) p.y = canvas.height; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
        requestAnimationFrame(animateParticles);
    }
    window.addEventListener('resize', initParticles);
    initParticles(); animateParticles();

    /* Lógica Blindada */
    let barajeado = false;
    const ritualMsgs = ["El universo escucha...", "Alineando astros...", "La energía fluye...", "El destino se prepara..."];
    const baseImg = "https://www.sacred-texts.com/tarot/pkt/img/";
    const mazo = [
        { n: "EL LOCO", img: baseImg+"ar00.jpg", e: "un salto de fe" },
        { n: "EL MAGO", img: baseImg+"ar01.jpg", e: "tu poder creador" },
        { n: "LA SACERDOTISA", img: baseImg+"ar02.jpg", e: "tu intuición" },
        { n: "LA EMPERATRIZ", img: baseImg+"ar03.jpg", e: "abundancia" },
        { n: "EL EMPERADOR", img: baseImg+"ar04.jpg", e: "estructura" },
        { n: "EL HIEROFANTE", img: baseImg+"ar05.jpg", e: "sabiduría" },
        { n: "LOS ENAMORADOS", img: baseImg+"ar06.jpg", e: "una elección" },
        { n: "EL CARRO", img: baseImg+"ar07.jpg", e: "avance rápido" },
        { n: "LA FUERZA", img: baseImg+"ar08.jpg", e: "fortaleza interna" },
        { n: "EL ERMITAÑO", img: baseImg+"ar09.jpg", e: "luz interior" },
        { n: "LA RUEDA", img: baseImg+"ar10.jpg", e: "giro del destino" },
        { n: "LA JUSTICIA", img: baseImg+"ar11.jpg", e: "equilibrio" },
        { n: "EL COLGADO", img: baseImg+"ar12.jpg", e: "pausa" },
        { n: "LA MUERTE", img: baseImg+"ar13.jpg", e: "cambio total" },
        { n: "LA TEMPLANZA", img: baseImg+"ar14.jpg", e: "armonía" },
        { n: "EL DIABLO", img: baseImg+"ar15.jpg", e: "apegos" },
        { n: "LA TORRE", img: baseImg+"ar16.jpg", e: "ruptura necesaria" },
        { n: "LA ESTRELLA", img: baseImg+"ar17.jpg", e: "esperanza" },
        { n: "LA LUNA", img: baseImg+"ar18.jpg", e: "enfrentar miedos" },
        { n: "EL SOL", img: baseImg+"ar19.jpg", e: "éxito radiante" },
        { n: "EL JUICIO", img: baseImg+"ar20.jpg", e: "renacimiento" },
        { n: "EL MUNDO", img: baseImg+"ar21.jpg", e: "plenitud" }
    ];

    const consejosBD = ["Evita gastos impulsivos.", "La suerte te sonríe.", "Medita antes de decidir.", "Protege tu luz.", "Confía en tus acuerdos."];

    window.onload = function() {
        const u = localStorage.getItem('u_n');
        if(!u) document.getElementById('scr-login').style.display = 'flex';
        else {
            document.getElementById('ritual-msg').innerText = ritualMsgs[Math.floor(Math.random() * ritualMsgs.length)];
            document.getElementById('scr-ritual-eyes').style.display = 'flex';
        }
    };

    function transition(fromId, toId) {
        const f = document.getElementById(fromId); f.classList.add('fade-out');
        setTimeout(() => { f.style.display = 'none'; f.classList.remove('fade-out'); const t = document.getElementById(toId); t.style.display = 'flex'; t.classList.add('fade-in'); }, 600);
    }

    function saveUser() {
        const n = document.getElementById('user-name').value;
        if(!n) return alert("Ingresa tu nombre.");
        localStorage.setItem('u_n', n); localStorage.setItem('u_m', document.getElementById('user-month').value);
        transition('scr-login', 'scr-ritual-eyes');
    }

    function mostrarArcanoDia() {
        const n = localStorage.getItem('u_n');
        const c = mazo[Math.floor(Math.random() * mazo.length)];
        document.getElementById('daily-welcome').innerText = `Bienvenida, ${n}`;
        document.getElementById('daily-card-container').innerHTML = `<div class="selected-wrapper"><div class="card flipped"><div class="card-inner"><div class="face front"><img src="${c.img}"><span>${c.n}</span></div></div></div></div>`;
        document.getElementById('daily-text').innerHTML = `Hoy recibes <strong>${c.n}</strong>, indicando ${c.e}.`;
        transition('scr-ritual-eyes', 'scr-daily');
    }

    function irTableroRitual() { transition('scr-daily', 'scr-ritual-3'); render(); }

    function render() {
        const b = document.getElementById('main-board');
        b.innerHTML = mazo.map(c => `<div class="card" onclick="pick(this, '${c.n}', '${c.e}', '${c.img}')"><div class="card-inner"><div class="face back">✦</div><div class="face front"><img src="${c.img}"><span>${c.n}</span></div></div></div>`).join('');
    }

    function mezclar() {
        barajeado = true; document.getElementById('btn-mix').style.display = 'none';
        setTimeout(() => { mazo.sort(() => 0.5 - Math.random()); render(); document.getElementById('main-board').classList.add('board-focus'); }, 1000);
    }

    let p = [];
    function pick(el, n, e, img) {
        if(!barajeado || p.length >= 3 || el.classList.contains('flipped')) return;
        el.classList.add('flipped'); p.push({n, e, img});
        if(p.length === 3) {
            setTimeout(() => {
                document.getElementById('selection-display').innerHTML = p.map(c => `<div class="selected-wrapper"><div class="card flipped"><div class="card-inner"><div class="face front"><img src="${c.img}"><span>${c.n}</span></div></div></div></div>`).join('');
                transition('scr-ritual-3', 'scr-visualize');
                setTimeout(() => document.getElementById('btn-read-now').style.display = 'block', 2500);
            }, 800);
        }
    }

    function irCargaMistica() {
        transition('scr-visualize', 'scr-loading');
        setTimeout(() => {
            const m = parseInt(localStorage.getItem('u_m') || "1");
            const consejoIdx = (p[0].n.length + m) % consejosBD.length;
            document.getElementById('res-content').innerHTML = `<div class="res-txt">El oráculo revela que tu camino abre con <strong>${p[0].n}</strong>, se nutre de <strong>${p[1].n}</strong> y culmina en <strong>${p[2].n}</strong>. Estás en un proceso de ${p[2].e}.</div><div class="consejo-box"><strong>Consejo:</strong> ${consejosBD[consejoIdx]}</div>`;
            transition('scr-loading', 'scr-results');
        }, 3500); 
    }

    function irPeticion() { transition('scr-results', 'scr-peticion'); }
    function enviarPeticion() { transition('scr-peticion', 'scr-final'); }
</script>
</body>
</html>
