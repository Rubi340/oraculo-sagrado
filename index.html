<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oráculo Sagrado Maestro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,500&display=swap');
        :root { --fondo: #050508; --oro: #c5a059; --texto: #d1d1d1; --oro-brillo: rgba(197, 160, 89, 0.8); }
        body { background: var(--fondo); color: var(--texto); font-family: 'Lora', serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .neblina { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'); opacity: 0.1; z-index: -1; animation: moveNeblina 60s linear infinite; }
        @keyframes moveNeblina { from { background-position: 0 0; } to { background-position: 1000px 1000px; } }
        #canvas-stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .screen { text-align: center; width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; transition: opacity 0.8s; z-index: 10; }
        .fade-out { opacity: 0 !important; }
        .fade-in { animation: fadeIn 1s; }
        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--oro); letter-spacing: 2px; text-shadow: 0 0 15px var(--oro-brillo); margin: 10px 0; }
        #daily-card-container { width: 150px; margin: 10px auto; }
        #daily-card-container .card { width: 100% !important; }
        .portal { width: 70px; height: 70px; border: 2px double var(--oro); border-radius: 50%; margin: 10px auto; animation: rotatePortal 20s linear infinite; box-shadow: 0 0 30px var(--oro-brillo); position: relative; }
        .portal::after { content: '✦'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--oro); font-size: 1rem; }
        @keyframes rotatePortal { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .velita { width: 30px; height: 30px; background: radial-gradient(circle, #fff, #ffcc00, transparent); border-radius: 50%; margin: 10px auto; filter: blur(4px); animation: flame 1.5s infinite alternate; }
        @keyframes flame { from { transform: scale(1); opacity: 0.7; } to { transform: scale(1.2); opacity: 1; } }
        button { background: linear-gradient(to bottom, #d4af37, #c5a059); border: none; color: black; padding: 12px; font-family: 'Cinzel'; cursor: pointer; margin: 8px auto; width: 240px; border-radius: 5px; font-weight: bold; text-transform: uppercase; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4); }
        .btn-pro { background: transparent; border: 1px solid var(--oro); color: var(--oro); width: auto; padding: 5px 15px; font-size: 0.7rem; margin-top: 10px; }
        input, select, textarea { background: rgba(255,255,255,0.05); border: none; border-bottom: 1px solid var(--oro); color: white; text-align: center; padding: 10px; margin: 5px; font-size: 1rem; outline: none; width: 80%; max-width: 250px; font-family: 'Lora'; }
        #main-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(65px, 1fr)); gap: 8px; width: 100%; margin: 10px auto; max-height: 40vh; overflow-y: auto; padding: 10px; opacity: 0.3; transition: 1s; }
        .board-focus { opacity: 1 !important; transform: scale(1); }
        .card { width: 100%; aspect-ratio: 2/3.5; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 6px; border: 1px solid var(--oro); overflow: hidden; }
        .back { background: radial-gradient(circle, #1a0b2e, #050508); display: flex; align-items: center; justify-content: center; color: var(--oro); font-size: 1.2rem; }
        .front { background: #1a0b2e; transform: rotateY(180deg); display: flex; flex-direction: column; }
        .front img { width: 100%; height: 80%; object-fit: cover; border-bottom: 1px solid var(--oro); }
        .front span { font-size: 7px; color: var(--oro); font-weight: bold; padding: 2px; font-family: 'Cinzel'; text-align: center; }
        .special-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--fondo); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .res-txt { font-style: italic; color: #fff; margin: 10px 0; font-size: 0.95rem; border-left: 2px solid var(--oro); padding-left: 12px; text-align: left; line-height: 1.4; }
        .consejo-box { border: 1px dashed var(--oro); padding: 12px; margin-top: 10px; background: rgba(197, 160, 89, 0.1); color: var(--oro); font-size: 0.85rem; border-radius: 8px; }
        #selection-display { display: flex; gap: 8px; justify-content: center; width: 100%; margin: 10px auto; }
        .selected-wrapper { filter: drop-shadow(0 0 15px var(--oro-brillo)); }
        #selection-display .card { width: 80px; }
    </style>
</head>
<body>
    <div class="neblina"></div>
    <canvas id="canvas-stars"></canvas>

    <div id="scr-login" class="screen" style="display:none;">
        <h1>Oráculo Sagrado</h1>
        <div class="portal"></div>
        <input type="text" id="user-name" placeholder="Tu Nombre">
        <select id="user-month">
            <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
            <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
            <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
            <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
        <button onclick="saveUser()">Consagrar Acceso</button>
        <button id="btn-master" class="btn-pro" onclick="activarMaestro()">Activar Nivel Maestro</button>
    </div>

    <div id="scr-ritual-eyes" class="screen" style="display:none;">
        <h3 id="ritual-msg"></h3>
        <div class="portal"></div>
        <div style="font-style:italic; color:var(--oro);">Cierra los ojos...</div>
        <button onclick="mostrarArcanoDia()">Listo</button>
    </div>

    <div id="scr-daily" class="screen" style="display:none;">
        <h2 id="daily-welcome"></h2>
        <div id="daily-card-container"></div>
        <div id="daily-text" class="res-txt"></div>
        <button onclick="irTableroRitual()">Lectura Profunda</button>
    </div>

    <div id="scr-ritual-3" class="screen" style="display:none;">
        <p id="guia-3" style="color:var(--oro)">Baraja las energías...</p>
        <button id="btn-mix" onclick="mezclar()">Barajar</button>
        <div id="main-board"></div>
    </div>

    <div id="scr-visualize" class="special-screen">
        <h3>TUS CARTAS</h3>
        <div id="selection-display"></div>
        <button id="btn-read-now" style="display:none;" onclick="irCargaMistica()">LEER</button>
    </div>

    <div id="scr-loading" class="special-screen"><div class="portal"></div><h3>Interpretando...</h3></div>

    <div id="scr-results" class="special-screen">
        <h2>Voz del Destino</h2>
        <div id="res-content"></div>
        <button onclick="transition('scr-results', 'scr-peticion')">Petición</button>
    </div>

    <div id="scr-peticion" class="special-screen">
        <div class="velita"></div>
        <textarea id="p-input" placeholder="Tu deseo..."></textarea>
        <button onclick="transition('scr-peticion', 'scr-final')">Sellar</button>
    </div>

    <div id="scr-final" class="special-screen"><h2>Enviado</h2><button onclick="location.reload()">Regresar</button></div>

<script>
    const canvas = document.getElementById('canvas-stars');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function initParticles() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        for(let i=0; i<30; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: Math.random()*0.3+0.1 });
    }
    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height); ctx.fillStyle = "#c5a059";
        particles.forEach(p => { p.y -= p.speed; if(p.y < 0) p.y = canvas.height; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); });
        requestAnimationFrame(animate);
    }
    initParticles(); animate();

    const baseImg = "https://www.sacred-texts.com/tarot/pkt/img/";
    const mazo8 = [
        { n: "EL LOCO", img: baseImg+"ar00.jpg", d: "un nuevo comienzo lleno de aventura." },
        { n: "EL MAGO", img: baseImg+"ar01.jpg", d: "el dominio de tus herramientas." },
        { n: "LA SACERDOTISA", img: baseImg+"ar02.jpg", d: "un llamado a la introspección." },
        { n: "LA EMPERATRIZ", img: baseImg+"ar03.jpg", d: "abundancia creativa." },
        { n: "EL EMPERADOR", img: baseImg+"ar04.jpg", d: "estructura y orden." },
        { n: "EL HIEROFANTE", img: baseImg+"ar05.jpg", d: "sabiduría ancestral." },
        { n: "LOS ENAMORADOS", img: baseImg+"ar06.jpg", d: "una elección del corazón." },
        { n: "EL CARRO", img: baseImg+"ar07.jpg", d: "victoria por determinación." },
        { n: "LA FUERZA", img: baseImg+"ar08.jpg", d: "coraje y amor propio." },
        { n: "EL ERMITAÑO", img: baseImg+"ar09.jpg", d: "iluminación en la soledad." },
        { n: "LA RUEDA", img: baseImg+"ar10.jpg", d: "un giro del destino." },
        { n: "LA JUSTICIA", img: baseImg+"ar11.jpg", d: "equilibrio y verdad." },
        { n: "EL COLGADO", img: baseImg+"ar12.jpg", d: "nueva perspectiva." },
        { n: "LA MUERTE", img: baseImg+"ar13.jpg", d: "un renacimiento necesario." },
        { n: "LA TEMPLANZA", img: baseImg+"ar14.jpg", d: "moderación y armonía." },
        { n: "EL DIABLO", img: baseImg+"ar15.jpg", d: "enfrentar tus sombras." },
        { n: "LA TORRE", img: baseImg+"ar16.jpg", d: "liberación repentina." },
        { n: "LA ESTRELLA", img: baseImg+"ar17.jpg", d: "esperanza y sanación." },
        { n: "LA LUNA", img: baseImg+"ar18.jpg", d: "confía en tu intuición." },
        { n: "EL SOL", img: baseImg+"ar19.jpg", d: "éxito y vitalidad." },
        { n: "EL JUICIO", img: baseImg+"ar20.jpg", d: "despertar espiritual." },
        { n: "EL MUNDO", img: baseImg+"ar21.jpg", d: "plenitud alcanzada." },
        { n: "AS DE OROS", img: baseImg+"pe01.jpg", d: "prosperidad material." },
        { n: "REY DE OROS", img: baseImg+"pe14.jpg", d: "maestría financiera." },
        { n: "AS DE COPAS", img: baseImg+"cu01.jpg", d: "amor desbordante." },
        { n: "DIEZ DE COPAS", img: baseImg+"cu10.jpg", d: "armonía familiar." },
        { n: "AS DE ESPADAS", img: baseImg+"sw01.jpg", d: "claridad mental cortante." },
        { n: "AS DE BASTOS", img: baseImg+"wa01.jpg", d: "chispa de pasión nueva." }
    ];

    let esMaestro = localStorage.getItem('maestro') === 'true';
    let currentMazo = esMaestro ? mazo8 : mazo8.slice(0,22);
    let p = []; let barajeado = false;

    window.onload = function() {
        if(esMaestro) document.getElementById('btn-master').style.display = 'none';
        const u = localStorage.getItem('u_n');
        if(!u) document.getElementById('scr-login').style.display = 'flex';
        else { document.getElementById('ritual-msg').innerText = "Conectando..."; document.getElementById('scr-ritual-eyes').style.display = 'flex'; }
    };

    function activarMaestro() { 
        localStorage.setItem('maestro', 'true'); esMaestro = true; 
        currentMazo = mazo8; alert("¡Nivel Maestro Activado!"); location.reload(); 
    }

    function transition(fromId, toId) {
        const f = document.getElementById(fromId); f.classList.add('fade-out');
        setTimeout(() => { f.style.display = 'none'; f.classList.remove('fade-out'); const t = document.getElementById(toId); t.style.display = 'flex'; t.classList.add('fade-in'); }, 600);
    }

    function saveUser() {
