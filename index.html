<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Oráculo Sagrado</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,500&display=swap');
        :root { --fondo: #050508; --oro: #c5a059; --texto: #d1d1d1; }
        body { background: var(--fondo); color: var(--texto); font-family: 'Lora', serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        .screen { text-align: center; width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; animation: fadeIn 1s; }
        h1, h2 { font-family: 'Cinzel', serif; color: var(--oro); }
        button { background: transparent; border: 1px solid var(--oro); color: var(--oro); padding: 12px; font-family: 'Cinzel'; cursor: pointer; margin: 10px auto; width: 260px; border-radius: 4px; transition: 0.3s; }
        button:hover { background: var(--oro); color: black; }
        .daily-btn { background: linear-gradient(45deg, #1a0b2e, #c5a059); color: white; border: none; font-weight: bold; }
        input { background: transparent; border: none; border-bottom: 1px solid var(--oro); color: white; text-align: center; padding: 10px; margin: 10px; font-size: 1.1rem; outline: none; }
        #main-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(60px, 1fr)); gap: 8px; width: 100%; margin: 20px auto; transition: 1.5s; transform: scale(0.7); opacity: 0.5; }
        .board-focus { transform: scale(1) !important; opacity: 1 !important; }
        .card { width: 100%; aspect-ratio: 2/3.5; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 4px; border: 1px solid var(--oro); }
        .back { background: radial-gradient(circle, #1a0b2e, #050508); display: flex; align-items: center; justify-content: center; color: var(--oro); }
        .front { background: white; transform: rotateY(180deg); display: flex; flex-direction: column; overflow: hidden; }
        .front img { width: 100%; height: 85%; object-fit: cover; }
        .front span { font-size: 8px; color: black; font-weight: bold; padding: 2px; }
        #result-box { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--fondo); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="scr-1" class="screen">
        <h1>Oráculo Sagrado</h1>
        <input type="text" id="consultante-name" placeholder="Tu Nombre">
        <button class="daily-btn" onclick="mostrarArcanoDia()">✨ Arcano del Día</button>
        <button onclick="irRitual()">Lectura Completa</button>
    </div>
    <div id="scr-2" class="screen" style="display:none;">
        <h2 id="saludo"></h2>
        <p>Concéntrate en tu pregunta...</p>
        <button onclick="irTablero()">Ver el Destino</button>
    </div>
    <div id="scr-3" class="screen" style="display:none;">
        <p id="guia" style="color:var(--oro)">Primero, baraja el mazo...</p>
        <button id="btn-mix" onclick="mezclar()">Barajar Mazo</button>
        <div id="main-board"></div>
    </div>
    <div id="result-box">
        <h2 id="res-title"></h2>
        <div id="res-content" style="max-width: 400px; text-align: center;"></div>
        <button onclick="location.reload()">Cerrar y Volver</button>
    </div>
<script>
    const mazo = [
        { n: "El Loco", img: "https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg", e: "un salto de fe." },
        { n: "El Mago", img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg", e: "crear tu realidad." },
        { n: "La Sacerdotisa", img: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg", e: "tu voz interior." },
        { n: "La Emperatriz", img: "https://upload.wikimedia.org/wikipedia/commons/a/af/RWS_Tarot_03_Empress.jpg", e: "abundancia." },
        { n: "El Emperador", img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg", e: "el orden necesario." },
        { n: "El Hierofante", img: "https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg", e: "sabiduría espiritual." },
        { n: "Los Enamorados", img: "https://upload.wikimedia.org/wikipedia/commons/3/35/RWS_Tarot_06_Lovers.jpg", e: "una elección de amor." },
        { n: "El Carro", img: "https://upload.wikimedia.org/wikipedia/commons/a/af/RWS_Tarot_07_Chariot.jpg", e: "victoria con enfoque." },
        { n: "La Fuerza", img: "https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg", e: "coraje interior." },
        { n: "El Ermitaño", img: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg", e: "reflexión." },
        { n: "La Rueda", img: "https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", e: "giros del destino." },
        { n: "La Justicia", img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg", e: "equilibrio y verdad." },
        { n: "El Colgado", img: "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg", e: "nueva visión." },
        { n: "La Muerte", img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg", e: "final de un ciclo." },
        { n: "La Templanza", img: "https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg", e: "paciencia." },
        { n: "El Diablo", img: "https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg", e: "soltar ataduras." },
        { n: "La Torre", img: "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg", e: "revelación súbita." },
        { n: "La Estrella", img: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg", e: "esperanza." },
        { n: "La Luna", img: "https://upload.wikimedia.org/wikipedia/commons/f/f7/RWS_Tarot_18_Moon.jpg", e: "intuición profunda." },
        { n: "El Sol", img: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg", e: "éxito y alegría." },
        { n: "El Juicio", img: "https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg", e: "renacer." },
        { n: "El Mundo", img: "https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg", e: "realización total." }
    ];

    function irRitual() {
        if(!document.getElementById('consultante-name').value) return alert("Dime tu nombre.");
        document.getElementById('saludo').innerText = `Bienvenida, ${document.getElementById('consultante-name').value}`;
        document.getElementById('scr-1').style.display = 'none';
        document.getElementById('scr-2').style.display = 'flex';
    }

    function mostrarArcanoDia() {
        const n = document.getElementById('consultante-name').value || "Consultante";
        const hoy = new Date().toDateString();
        const index = (n.length + hoy.length) % mazo.length;
        const c = mazo[index];
        document.getElementById('res-title').innerText = "Tu Arcano de Hoy";
        document.getElementById('res-content').innerHTML = `<img src="${c.img}" style="width:140px; border-radius:8px; margin-bottom:10px;"><p>Hoy es día de <strong>${c.e}</strong></p>`;
        document.getElementById('result-box').style.display = 'flex';
    }

    function irTablero() {
        document.getElementById('scr-2').style.display = 'none';
        document.getElementById('scr-3').style.display = 'flex';
        render();
    }

    function render() {
        const b = document.getElementById('main-board');
        b.innerHTML = mazo.map(c => `<div class="card" onclick="pick(this, '${c.e}')"><div class="card-inner"><div class="face back">✦</div><div class="face front"><img src="${c.img}"><span>${c.n}</span></div></div></div>`).join('');
    }

    function mezclar() {
        document.getElementById('btn-mix').style.display = 'none';
        document.getElementById('guia').innerText = "Barajando...";
        setTimeout(() => {
            mazo.sort(() => 0.5 - Math.random());
            render();
            document.getElementById('main-board').classList.add('board-focus');
            document.getElementById('guia').innerText = "Ahora, elige 3 cartas para tu destino";
        }, 1000);
    }

    let p = [];
    function pick(el, e) {
        if(el.classList.contains('flipped') || p.length >= 3) return;
        el.classList.add('flipped');
        p.push(e);
        if(p.length === 3) setTimeout(() => {
            document.getElementById('res-title').innerText = "Revelación Profunda";
            document.getElementById('res-content').innerHTML = `<p><strong>Pasado:</strong> ${p[0]}</p><p><strong>Presente:</strong> ${p[1]}</p><p><strong>Futuro:</strong> ${p[2]}</p>`;
            document.getElementById('result-box').style.display = 'flex';
        }, 1000);
    }
</script>
</body>
</html>
