<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>El Oráculo Sagrado</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,500&display=swap');

        :root {
            --fondo: #050508;
            --oro: #c5a059;
            --texto: #d1d1d1;
        }

        body {
            background: var(--fondo);
            color: var(--texto);
            font-family: 'Lora', serif;
            margin: 0; min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        .screen {
            text-align: center; width: 100%; max-width: 600px; padding: 25px;
            box-sizing: border-box; animation: fadeIn 1.2s ease-in-out;
            display: flex; flex-direction: column; justify-content: center;
        }

        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--oro); margin: 10px 0; }

        input, textarea {
            background: transparent; border: none; border-bottom: 2px solid var(--oro);
            color: white; font-size: 1.2rem; text-align: center; width: 90%; outline: none;
            font-family: 'Lora', serif; margin: 15px auto;
        }

        input[type="date"] { color-scheme: dark; }

        /* --- PORTAL --- */
        .portal {
            width: 100px; height: 100px; border: 1px double var(--oro);
            border-radius: 50%; margin: 25px auto;
            position: relative; animation: rotatePortal 20s linear infinite;
        }
        @keyframes rotatePortal { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .portal::after {
            content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%; border: 1px solid rgba(197, 160, 89, 0.2);
            animation: pulse 4s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.3); opacity: 0.7; } }

        /* --- TABLERO --- */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px; margin: 20px auto;
            width: 100%; max-width: 450px;
        }

        .card { width: 100%; aspect-ratio: 2/3.5; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 5px; border: 1px solid var(--oro); }
        .back { background: radial-gradient(circle, #1a0b2e, #050508); display: flex; align-items: center; justify-content: center; color: var(--oro); font-size: 1.5rem; }
        .front { background: white; color: black; transform: rotateY(180deg); display: flex; flex-direction: column; overflow: hidden; }
        .front img { width: 100%; height: 80%; object-fit: cover; }
        .front span { font-size: 8px; font-weight: bold; margin-top: 3px; text-align: center; }

        /* --- BOTONES --- */
        button {
            background: transparent; border: 1px solid var(--oro); color: var(--oro);
            padding: 15px 20px; font-family: 'Cinzel', serif; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.5s;
            margin: 10px auto; width: 90%; max-width: 320px;
        }
        button:hover { background: var(--oro); color: black; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }

        .candle { width: 15px; height: 25px; background: #ffcc00; border-radius: 50% 50% 20% 20%; margin: 15px auto; box-shadow: 0 0 20px #ff6600; animation: flicker 0.1s infinite alternate; }
        @keyframes flicker { from { transform: scale(1); opacity: 0.8; } to { transform: scale(1.1); opacity: 1; } }

        #result-box, #ritual-cierre, #peticion-box { display: none; margin-top: 20px; padding: 20px; border: 1px double var(--oro); background: rgba(255,255,255,0.03); backdrop-filter: blur(5px); animation: fadeIn 2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="scr-1" class="screen">
        <h1>Oráculo Sagrado</h1>
        <p id="dynamic-intro" style="font-style: italic; opacity: 0.8; font-size: 0.9rem;"></p>
        <p>¿Quién busca respuestas hoy?</p>
        <input type="text" id="consultante-name" placeholder="Tu nombre..." autocomplete="off">
        <p>Fecha de origen:</p>
        <input type="date" id="birthdate">
        <button onclick="irRitual()">Conectar con el Destino</button>
    </div>

    <div id="scr-2" class="screen" style="display:none;">
        <h2>Ritual de Intención</h2>
        <div class="portal"></div>
        <p id="arcano-natal" style="color: var(--oro); font-weight: bold;"></p>
        <p><strong>Cierra los ojos y respira profundamente.</strong></p>
        <p>Piensa en aquello que quieres saber. Deja que tu pregunta sea una imagen clara en tu mente.</p>
        <button onclick="irTablero()">Abrir el tercer ojo</button>
    </div>

    <div id="scr-3" class="screen" style="display:none;">
        <h2 id="board-name"></h2>
        <button id="btn-mix" onclick="mezclarEnergias()">Barajar el Destino</button>
        <div class="board" id="main-board"></div>

        <div id="result-box">
            <h3 id="res-title"></h3>
            <div id="res-text"></div>
        </div>

        <div id="ritual-cierre">
            <h3>Sellar el Encuentro</h3>
            <button onclick="abrirPeticion()">Elevar Petición</button>
            <button onclick="finalizar(false)" style="color:#666; border-color:#666;">Solo Salir</button>
        </div>

        <div id="peticion-box">
            <div class="candle"></div>
            <textarea id="peticion-input" placeholder="Lo que deseo manifestar es..."></textarea>
            <button onclick="finalizar(true)">Sellar con Gratitud</button>
        </div>
    </div>

<script>
    const mazo = [
        { n: "El Loco", img: "https://upload.wikimedia.org/wikipedia/commons/9/90/RWS_Tarot_00_Fool.jpg", e: "la libertad de dar un salto al vacío con fe" },
        { n: "El Mago", img: "https://upload.wikimedia.org/wikipedia/commons/d/de/RWS_Tarot_01_Magician.jpg", e: "tu capacidad de manifestar lo que imaginas" },
        { n: "La Sacerdotisa", img: "https://upload.wikimedia.org/wikipedia/commons/8/88/RWS_Tarot_02_High_Priestess.jpg", e: "los misterios de tu propia intuición" },
        { n: "La Emperatriz", img: "https://upload.wikimedia.org/wikipedia/commons/a/af/RWS_Tarot_03_Empress.jpg", e: "la abundancia que florece en ti" },
        { n: "El Emperador", img: "https://upload.wikimedia.org/wikipedia/commons/c/c3/RWS_Tarot_04_Emperor.jpg", e: "el orden necesario para tu éxito" },
        { n: "El Hierofante", img: "https://upload.wikimedia.org/wikipedia/commons/8/8d/RWS_Tarot_05_Hierophant.jpg", e: "la sabiduría de los consejos sabios" },
        { n: "Los Enamorados", img: "https://upload.wikimedia.org/wikipedia/commons/3/35/RWS_Tarot_06_Lovers.jpg", e: "las decisiones que nacen del corazón" },
        { n: "El Carro", img: "https://upload.wikimedia.org/wikipedia/commons/a/af/RWS_Tarot_07_Chariot.jpg", e: "la victoria por tu determinación" },
        { n: "La Fuerza", img: "https://upload.wikimedia.org/wikipedia/commons/f/f5/RWS_Tarot_08_Strength.jpg", e: "el dominio de tu ser por el amor propio" },
        { n: "El Ermitaño", img: "https://upload.wikimedia.org/wikipedia/commons/4/4d/RWS_Tarot_09_Hermit.jpg", e: "la luz de tu propio silencio interno" },
        { n: "La Rueda", img: "https://upload.wikimedia.org/wikipedia/commons/3/3c/RWS_Tarot_10_Wheel_of_Fortune.jpg", e: "los ciclos inevitables del destino" },
        { n: "La Justicia", img: "https://upload.wikimedia.org/wikipedia/commons/e/e0/RWS_Tarot_11_Justice.jpg", e: "el equilibrio que trae la verdad" },
        { n: "El Colgado", img: "https://upload.wikimedia.org/wikipedia/commons/2/2b/RWS_Tarot_12_Hanged_Man.jpg", e: "la nueva perspectiva tras la pausa" },
        { n: "La Muerte", img: "https://upload.wikimedia.org/wikipedia/commons/d/d7/RWS_Tarot_13_Death.jpg", e: "el final de un ciclo para que nazca lo nuevo" },
        { n: "La Templanza", img: "https://upload.wikimedia.org/wikipedia/commons/f/f8/RWS_Tarot_14_Temperance.jpg", e: "la armonía de tus fuerzas opuestas" },
        { n: "El Diablo", img: "https://upload.wikimedia.org/wikipedia/commons/5/55/RWS_Tarot_15_Devil.jpg", e: "las ataduras que tienes el poder de romper" },
        { n: "La Torre", img: "https://upload.wikimedia.org/wikipedia/commons/5/53/RWS_Tarot_16_Tower.jpg", e: "la caída de lo falso para renacer" },
        { n: "La Estrella", img: "https://upload.wikimedia.org/wikipedia/commons/d/db/RWS_Tarot_17_Star.jpg", e: "la esperanza renovada bajo el cosmos" },
        { n: "La Luna", img: "https://upload.wikimedia.org/wikipedia/commons/f/f7/RWS_Tarot_18_Moon.jpg", e: "la intuición que vence a la confusión" },
        { n: "El Sol", img: "https://upload.wikimedia.org/wikipedia/commons/1/17/RWS_Tarot_19_Sun.jpg", e: "el éxito radiante que te pertenece" },
        { n: "El Juicio", img: "https://upload.wikimedia.org/wikipedia/commons/d/dd/RWS_Tarot_20_Judgement.jpg", e: "tu llamado a una vida superior" },
        { n: "El Mundo", img: "https://upload.wikimedia.org/wikipedia/commons/f/ff/RWS_Tarot_21_World.jpg", e: "la plenitud y cierre de tu viaje actual" }
    ];

    const alertas = [
        "Esta semana evita firmar documentos bajo impulsos. El silencio será tu mejor aliado.",
        "Es tu momento de brillar. El cosmos te pide que no guardes tus ideas.",
        "Precaución: Alguien del pasado podría buscarte; escucha tu intuición primero.",
        "El destino favorece los movimientos. Es momento de caminar hacia tu meta.",
        "Esta semana no fuerces respuestas. La paciencia revelará el camino."
    ];

    function calcularArcano(f) {
        let suma = [...f.replace(/-/g, '')].reduce((a, b) => parseInt(a) + parseInt(b), 0);
        while(suma > 22) { suma = Math.floor(suma/10) + (suma%10); }
        if(suma === 22) suma = 0;
        return `Tu Arcano Natal: ${mazo[suma].n}.`;
    }

    function irRitual() {
        const n = document.getElementById('consultante-name').value;
        const f = document.getElementById('birthdate').value;
        if(!n || !f) return alert("Dime tu nombre y fecha.");
        document.getElementById('arcano-natal').innerText = calcularArcano(f);
        document.getElementById('scr-1').style.display = 'none';
        document.getElementById('scr-2').style.display = 'flex';
    }

    function irTablero() {
        document.getElementById('scr-2').style.display = 'none';
        document.getElementById('scr-3').style.display = 'flex';
        document.getElementById('board-name').innerText = `Destino de ${document.getElementById('consultante-name').value}`;
        crearTablero();
    }

    function crearTablero() {
        const board = document.getElementById('main-board');
        board.innerHTML = '';
        mazo.forEach((c, i) => {
            board.innerHTML += `<div class="card" onclick="seleccionar(this, '${c.n}', '${c.e}')"><div class="card-inner"><div class="face back">✦</div><div class="face front"><img src="${c.img}"><span>${c.n}</span></div></div></div>`;
        });
    }

    function mezclarEnergias() {
        const cards = document.querySelectorAll('.card');
        const btn = document.getElementById('btn-mix');
        btn.disabled = true;
        btn.innerText = "Sincronizando...";
        cards.forEach((c, i) => {
            const angle = (i / cards.length) * Math.PI * 2;
            c.style.transition = "all 1.2s ease-in-out";
            c.style.transform = `translate(${Math.cos(angle)*160}px, ${Math.sin(angle)*160}px) rotate(${angle}rad) scale(1.1)`;
        });
        setTimeout(() => {
            cards.forEach(c => c.style.transform = "translate(0,0) rotate(0deg) scale(1)");
            mazo.sort(() => 0.5 - Math.random());
            crearTablero();
            btn.style.display = 'none';
        }, 1600);
    }

    let picks = [];
    function seleccionar(el, n, e) {
        if(el.classList.contains('flipped') || picks.length >= 3 || document.getElementById('btn-mix').style.display !== 'none') return;
        el.classList.add('flipped');
        picks.push({n, e});
        if(picks.length === 3) setTimeout(mostrarResultados, 1000);
    }

    function mostrarResultados() {
        const n = document.getElementById('consultante-name').value;
        const alerta = alertas[Math.floor(Math.random() * alertas.length)];
        document.getElementById('res-title').innerText = `Revelación Sagrada`;
        document.getElementById('res-text').innerHTML = `
            <p>${n}, tu energía nace de <strong>${picks[0].e}</strong>.</p> 
            <p>El presente te pide reconocer <strong>${picks[1].e}</strong>.</p> 
            <p>Tu camino te guiará hacia <strong>${picks[2].e}</strong>.</p>
            <hr style="border:0; border-top:1px double var(--oro); margin:20px 0;">
            <p style="color:var(--oro); font-style:italic;">✨ <strong>Consejo del Oráculo:</strong> ${alerta}</p>
        `;
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('ritual-cierre').style.display = 'block';
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    function abrirPeticion() { document.getElementById('ritual-cierre').style.display = 'none'; document.getElementById('peticion-box').style.display = 'block'; }

    function finalizar(p) {
        const n = document.getElementById('consultante-name').value;
        alert(p ? "Tu petición ha sido entregada al éter." : "Que la luz te guíe.");
        document.body.innerHTML = `<div style="text-align:center; color:var(--oro); font-family:'Cinzel'; padding:20px; margin-top:15%"><h1>El Círculo se ha cerrado</h1><p style="color:white">Gracias, ${n}.</p><div style="margin-top:40px; border:1px solid var(--oro); padding:20px; background:rgba(255,255,255,0.03)"><p>¿Deseas que el Destino te envíe una guía semanal?</p><input type="email" id="u-email" placeholder="Tu correo electrónico" style="font-size:1rem; width:80%"><br><button onclick="location.reload()">Recibir Guía y Volver</button></div></div>`;
    }
</script>
</body>
</html>
