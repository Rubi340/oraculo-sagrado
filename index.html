<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Oráculo Sagrado</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;1,500&display=swap');
        :root { --fondo: #050508; --oro: #c5a059; --texto: #d1d1d1; }
        body { background: var(--fondo); color: var(--texto); font-family: 'Lora', serif; margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
        
        .screen { text-align: center; width: 100%; max-width: 800px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: center; transition: opacity 0.8s; }
        .fade-out { opacity: 0 !important; }
        .fade-in { animation: fadeIn 1s; }
        h1, h2, h3 { font-family: 'Cinzel', serif; color: var(--oro); letter-spacing: 2px; }
        
        /* Efecto Portal de Fuego Dorado */
        .portal { width: 100px; height: 100px; border: 2px double var(--oro); border-radius: 50%; margin: 20px auto; animation: rotatePortal 20s linear infinite; box-shadow: 0 0 30px rgba(197, 160, 89, 0.5), inset 0 0 20px rgba(197, 160, 89, 0.3); position: relative; }
        .portal::after { content: '✦'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--oro); font-size: 1.5rem; text-shadow: 0 0 10px var(--oro); }
        @keyframes rotatePortal { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        button { background: linear-gradient(to bottom, #d4af37, #c5a059); border: none; color: black; padding: 16px; font-family: 'Cinzel'; cursor: pointer; margin: 15px auto; width: 280px; border-radius: 5px; font-weight: bold; transition: 0.4s; text-transform: uppercase; box-shadow: 0 4px 15px rgba(197, 160, 89, 0.4); }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(197, 160, 89, 0.6); }
        
        input, select, textarea { background: transparent; border: none; border-bottom: 1px solid var(--oro); color: white; text-align: center; padding: 12px; margin: 10px; font-size: 1.2rem; outline: none; width: 80%; max-width: 300px; }
        
        #main-board { display: grid; grid-template-columns: repeat(auto-fit, minmax(75px, 1fr)); gap: 12px; width: 100%; margin: 20px auto; transition: 1s; transform: scale(0.85); opacity: 0.3; max-height: 50vh; overflow-y: auto; padding: 10px; }
        .board-focus { transform: scale(1) !important; opacity: 1 !important; }
        
        /* Cartas Estilo Captura */
        .card { width: 100%; aspect-ratio: 2/3.5; perspective: 1000px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; transition: transform 0.6s; }
        .card.flipped .card-inner { transform: rotateY(180deg); }
        .face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 8px; border: 1px solid var(--oro); overflow: hidden; }
        .back { background: radial-gradient(circle, #1a0b2e, #050508); display: flex; align-items: center; justify-content: center; color: var(--oro); }
        .front { background: #1a0b2e; transform: rotateY(180deg); display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(197, 160, 89, 0.3); }
        .front img { width: 100%; height: 85%; object-fit: cover; border-bottom: 1px solid var(--oro); }
        .front span { font-size: 9px; color: var(--oro); font-weight: bold; padding: 4px; font-family: 'Cinzel'; text-align: center; }

        .special-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--fondo); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 25px; box-sizing: border-box; }
        .res-txt { font-style: italic; color: #fff; margin: 15px 0; font-size: 1.1rem; border-left: 2px solid var(--oro); padding-left: 15px; text-align: left; line-height: 1.6; }
        
        /* Fuego/Resplandor Detrás de Cartas Elegidas */
        #selection-display { display: flex; gap: 15px; justify-content: center; width: 100%; margin: 20px auto; }
        .selected-wrapper { filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.6)); animation: fireGlow 2s infinite alternate; }
        @keyframes fireGlow { from { filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.4)); } to { filter: drop-shadow(0 0 25px rgba(197, 160, 89, 0.8)); } }
        #selection-display .card { width: 100px; cursor: default; }

        .eye-ritual { font-size: 1.4rem; color: var(--oro); font-style: italic; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="scr-login" class="screen" style="display:none;">
        <h1>Oráculo Sagrado</h1>
        <div class="portal"></div>
        <input type="text" id="user-name" placeholder="Tu Nombre">
        <select id="user-month">
            <option value="" disabled selected>Mes de Nacimiento</option>
            <option value="1">Enero</option><option value="2">Febrero</option><option value="3">Marzo</option>
            <option value="4">Abril</option><option value="5">Mayo</option><option value="6">Junio</option>
            <option value="7">Julio</option><option value="8">Agosto</option><option value="9">Septiembre</option>
            <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
        <button onclick="saveUser()">Consagrar Acceso</button>
    </div>

    <div id="scr-ritual-eyes" class="screen" style="display:none;">
        <h3 id="ritual-msg" style="min-height: 50px;"></h3>
        <div class="portal"></div>
        <div class="eye-ritual">Cierra los ojos...</div>
        <p>Piensa en la pregunta a la que buscas respuesta.</p>
        <button onclick="mostrarArcanoDia()">Todo está listo</button>
    </div>

    <div id="scr-daily" class="screen" style="display:none;">
        <h3 id="daily-welcome"></h3>
        <h2>Revelación de Hoy</h2>
        <div id="daily-card-container"></div>
        <div id="daily-text" class="res-txt"></div>
        <button onclick="irTableroRitual()">Lectura Profunda</button>
    </div>

    <div id="scr-ritual-3" class="screen" style="display:none;">
        <p id="guia-3" style="color:var(--oro)">Primero, baraja las energías...</p>
        <button id="btn-mix" onclick="mezclar()">Barajar Mazo</button>
        <div id="main-board"></div>
    </div>

    <div id="scr-visualize" class="special-screen">
        <h3>TUS CARTAS ELEGIDAS</h3>
        <div id="selection-display"></div>
        <p style="color:var(--oro); font-style:italic;">Visualiza tu elección por un momento...</p>
        <button id="btn-read-now" style="display:none;" onclick="irCargaMistica()">LEER LAS CARTAS</button>
    </div>

    <div id="scr-loading" class="special-screen">
        <div class="portal"></div>
        <h3 class="eye-ritual">El oráculo está hablando...</h3>
    </div>

    <div id="scr-results" class="special-screen">
        <h2>Voz del Destino</h2>
        <div id="res-content"></div>
        <button onclick="location.reload()">Regresar</button>
    </div>

<script>
    let barajeado = false;
    const ritualMsgs = ["El universo escucha...", "Alineando astros...", "La energía fluye...", "El destino se prepara..."];
    
    // Imágenes más estables
    const baseImg = "https://www.sacred-texts.com/tarot/pkt/img/";
    const mazo = [
        { n: "EL LOCO", img: baseImg+"ar00.jpg", e: "un salto de fe con fe plena" },
        { n: "EL MAGO", img: baseImg+"ar01.jpg", e: "el poder de tu voluntad" },
        { n: "LA SACERDOTISA", img: baseImg+"ar02.jpg", e: "secretos que tu intuición conoce" },
        { n: "LA EMPERATRIZ", img: baseImg+"ar03.jpg", e: "abundancia y creación constante" },
        { n: "EL EMPERADOR", img: baseImg+"ar04.jpg", e: "necesidad de orden y estructura" },
        { n: "EL HIEROFANTE", img: baseImg+"ar05.jpg", e: "guía y sabiduría tradicional" },
        { n: "LOS ENAMORADOS", img: baseImg+"ar06.jpg", e: "una elección crucial del alma" },
        { n: "EL CARRO", img: baseImg+"ar07.jpg", e: "un avance imparable a tu objetivo" },
        { n: "LA FUERZA", img: baseImg+"ar08.jpg", e: "domar instintos con amor puro" },
        { n: "EL ERMITAÑO", img: baseImg+"ar09.jpg", e: "búsqueda de tu luz interior" },
        { n: "LA RUEDA", img: baseImg+"ar10.jpg", e: "un giro favorable en tu destino" },
        { n: "LA JUSTICIA", img: baseImg+"ar11.jpg", e: "resolución justa de tus actos" },
        { n: "EL COLGADO", img: baseImg+"ar12.jpg", e: "pausa que otorga iluminación" },
        { n: "LA MUERTE", img: baseImg+"ar13.jpg", e: "transformación hacia lo mejor" },
        { n: "LA TEMPLANZA", img: baseImg+"ar14.jpg", e: "armonización de tu energía vital" },
        { n: "EL DIABLO", img: baseImg+"ar15.jpg", e: "liberarte de apegos limitantes" },
        { n: "LA TORRE", img: baseImg+"ar16.jpg", e: "ruptura de falsas estructuras" },
        { n: "LA ESTRELLA", img: baseImg+"ar17.jpg", e: "luz de esperanza en tu camino" },
        { n: "LA LUNA", img: baseImg+"ar18.jpg", e: "enfrentar miedos para sanar" },
        { n: "EL SOL", img: baseImg+"ar19.jpg", e: "el éxito radiante que mereces" },
        { n: "EL JUICIO", img: baseImg+"ar20.jpg", e: "renacimiento espiritual total" },
        { n: "EL MUNDO", img: baseImg+"ar21.jpg", e: "culminación de tus sueños" }
    ];

    window.onload = function() {
        const u = localStorage.getItem('u_n');
        if(!u) document.getElementById('scr-login').style.display = 'flex';
        else {
            document.getElementById('ritual-msg').innerText = ritualMsgs[Math.floor(Math.random() * ritualMsgs.length)];
            document.getElementById('scr-ritual-eyes').style.display = 'flex';
        }
    };

    function transition(fromId, toId) {
        document.getElementById(fromId).classList.add('fade-out');
        setTimeout(() => {
            document.getElementById(fromId).style.display = 'none';
            document.getElementById(toId).style.display = 'flex';
            document.getElementById(toId).classList.add('fade-in');
        }, 800);
    }

    function saveUser() {
        localStorage.setItem('u_n', document.getElementById('user-name').value);
        localStorage.setItem('u_m', document.getElementById('user-month').value);
        transition('scr-login', 'scr-ritual-eyes');
    }

    function mostrarArcanoDia() {
        const n = localStorage.getItem('u_n');
        const c = mazo[Math.floor(Math.random() * mazo.length)];
        document.getElementById('daily-welcome').innerText = `Bienvenido/a, ${n}`;
        document.getElementById('daily-card-container').innerHTML = `<div class="selected-wrapper"><div class="card flipped"><div class="card-inner"><div class="face front"><img src="${c.img}"><span>${c.n}</span></div></div></div></div>`;
        document.getElementById('daily-text').innerText = `Hoy el destino te otorga ${c.n}, lo que indica ${c.e}.`;
        transition('scr-ritual-eyes', 'scr-daily');
    }

    function irTableroRitual() { transition('scr-daily', 'scr-ritual-3'); render(); }

    function render() {
        const b = document.getElementById('main-board');
        b.innerHTML = mazo.map(c => `<div class="card" onclick="pick(this, '${c.n}', '${c.e}', '${c.img}')"><div class="card-inner"><div class="face back">✦</div><div class="face front"><img src="${c.img}"><span>${c.n}</span></div></div></div>`).join('');
    }

    function mezclar() {
        barajeado = true;
        document.getElementById('btn-mix').style.display = 'none';
        document.getElementById('guia-3').innerText = "Barajando...";
        setTimeout(() => {
            mazo.sort(() => 0.5 - Math.random());
            render();
            document.getElementById('main-board').classList.add('board-focus');
            document.getElementById('guia-3').innerText = "Elige 3 cartas";
        }, 1200);
    }

    let p = [];
    function pick(el, n, e, img) {
        if(!barajeado || p.length >= 3) return;
        el.classList.add('flipped');
        p.push({n, e, img});
        if(p.length === 3) {
            setTimeout(() => {
                const display = document.getElementById('selection-display');
                display.innerHTML = p.map(c => `<div class="selected-wrapper"><div class="card flipped"><div class="card-inner"><div class="face front"><img src="${c.img}"><span>${c.n}</span></div></div></div></div>`).join('');
                transition('scr-ritual-3', 'scr-visualize');
                setTimeout(() => document.getElementById('btn-read-now').style.display = 'block', 3000);
            }, 1000);
        }
    }

    function irCargaMistica() {
        transition('scr-visualize', 'scr-loading');
        setTimeout(() => {
            document.getElementById('res-content').innerHTML = `<div class="res-txt">El oráculo revela que tu camino abre con <strong>${p[0].n}</strong>, se nutre de <strong>${p[1].n}</strong> y culmina en <strong>${p[2].n}</strong>. Las estrellas indican que estás en un proceso de ${p[2].e}.</div>`;
            transition('scr-loading', 'scr-results');
        }, 4000); 
    }
</script>
</body>
</html>
